name: Actualizar proyectos vigentes

on:
  push:
    branches:
      - main
    paths:
      - "input/data_proyectos.rdata"   # se activa solo si cambia el .rdata

  workflow_dispatch:                   # permite ejecución manual desde GitHub

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Clonar el repositorio
      - name: Checkout repositorio
        uses: actions/checkout@v4

      # 2. Instalar R
      - name: Instalar R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4.0"
          use-public-rspm: true

      # 3. Instalar paquetes R con caché
      - name: Instalar dependencias R
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::RefManageR
            any::dplyr
            any::stringr
            any::stringi
            any::tidyr
            any::labelled

      # 4. proc-inicial.R → output/proyectos_vigentes.csv
      - name: Paso 1 - Procesar datos (rdata → csv)
        run: Rscript proc-inicial.R

      # 5. generar_bibtex.R → proyectos/proyectos.bib
      - name: Paso 2 - Generar BibTeX (csv → bib)
        run: Rscript generar_bibtex.R

      # 6. proyectos2quarto.R → proyectos/posts/*.qmd
      - name: Paso 3 - Generar QMDs (bib → qmd)
        run: Rscript proyectos2quarto.R

      # 7. Instalar Quarto
      - name: Instalar Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      # 8. Renderizar el sitio → docs/
      - name: Paso 4 - Renderizar sitio Quarto
        run: quarto render

      # 9. Commit y push de los archivos generados
      - name: Paso 5 - Commit y push
        run: |
          git config --local user.name  "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add output/proyectos_vigentes.csv
          git add proyectos/proyectos.bib
          git add proyectos/posts/
          git add docs/
          git diff --staged --quiet || git commit -m "Actualización automática [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
